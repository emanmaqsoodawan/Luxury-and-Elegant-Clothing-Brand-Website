<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | E L E G A N C E</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="page-body">
    <nav class="navbar admin-navbar">
        <div class="logo admin-logo">E L E G A N C E</div>
        <ul class="nav-links">
            <li><a href="index.html" class="admin-nav-link">Back to Store</a></li>
        </ul>
    </nav>
    <div class="page-header">
        <h1>Contact Us</h1>
        <p>We are here to assist you with any inquiries.</p>
    </div>
    <div class="page-content">
        <h2>Get in Touch</h2>
        <p>If you have any questions regarding our collections, your order, or our luxury services, please reach out to us using the form below. Our concierge team will respond within 24 hours.</p>
        <form class="contact-form" onsubmit="event.preventDefault(); alert('Message sent! We will get back to you shortly.'); this.reset();">
            <input type="text" class="form-input" placeholder="Full Name" required>
            <input type="email" class="form-input" placeholder="Email Address" required>
            <input type="text" class="form-input" placeholder="Order Number (Optional)">
            <textarea rows="6" class="form-input" placeholder="Your Message" required></textarea>
            <button type="submit" class="btn contact-btn">Send Message</button>
        </form>
    </div>
</body>
</html>
